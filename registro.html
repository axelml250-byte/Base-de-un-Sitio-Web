<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiTienda | Registro</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <!-- CABECERA LIMPIA -->
    <header class="main-header">
        <div class="header-container">           
            <h1 class="logo">MiTienda</h1>        
            <nav class="nav-left">
                <a href="index.html">Inicio</a>
                <a href="productos.html">Productos</a>
                <a href="nosotros.html">Conócenos</a>
                <a href="contacto.html">Contacto</a>
            </nav>
            <div class="nav-right" style="display: flex; align-items: center; gap: 15px; position: relative;">
                <!-- 🛒 El carrito se queda fuera para acceso rápido (Siempre visible) -->
                <a href="carrito.html" style="color: #2ecc71; font-weight: bold; text-decoration: none; margin-right: 5px;">
                    🛒 Carrito (<span id="cart-counter">0</span>)
                </a>

                <!-- 🍔 BOTÓN DE 3 RAYITAS (UNIVERSAL) -->
                <div class="menu-hamburguesa-container">
                    <button id="btn-hamburguesa" onclick="toggleMenuUniversal()" style="background: none; border: none; font-size: 24px; color: #2c3e50; cursor: pointer; padding: 5px; display: flex; align-items: center;">
                        ☰
                    </button>
        
                    <!-- 📂 MENÚ DESPLEGABLE UNIVERSAL -->
                    <div id="dropdown-universal" class="dropdown-universal-content">
            
                        <!-- 🌐 SECCIÓN DE IDIOMAS (MÓDULO EXTRA - OCULTO POR DEFECTO) -->
                        <!-- 👇 Nota: Al tener display: none; no se verá en la página actual hasta que decidas activarlo -->
                        <div id="modulo-idioma-extra" style="display: none; padding: 10px 15px; border-bottom: 1px solid #eee; align-items: center; justify-content: space-between;">
                            <span style="font-size: 13px; font-weight: bold; color: #666;">Idioma:</span>
                            <select id="language-select" style="padding: 4px 8px; border-radius: 4px; border: 1px solid #ccc; background: white; font-size: 13px; cursor: pointer;">
                                <option value="es">🇲🇽 ES</option>
                                <option value="en">🇺🇸 EN</option>
                            </select>
                        </div>

                        <!-- 🔓 BOTONES PÚBLICOS (Se muestran por defecto / Se ocultan con backend) -->
                        <div id="opciones-publicas">
                            <a href="login.html">🔑 Iniciar Sesión</a>
                            <a href="registro.html" style="color: #3498db; font-weight: bold;">📝 Registrarse</a>
                        </div>

                        <!-- 🔒 BOTONES PRIVADOS (Se activan únicamente al iniciar sesión) -->
                        <!-- Nota: De momento lo dejamos oculto con display:none; para simular el estado de visitante -->
                        <div id="opciones-privadas" style="display: none;">
                            <a href="admin.html">⚙️ Panel Admin</a>
                            <a href="perfil.html">📦 Mis Pedidos</a>
                            <hr style="border: 0; border-top: 1px solid #eee; margin: 5px 0;">
                            <a href="#" id="menu-logout-btn" style="color: #e74c3c; font-weight: bold;">❌ Cerrar Sesión</a>
                        </div>
            
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content" style="display: flex; justify-content: center; align-items: center; min-height: 65vh;">
        <div style="background: white; padding: 40px; border-radius: 8px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); width: 100%; max-width: 400px;">
            <h2 style="text-align: center; margin-bottom: 20px; color: #2c3e50;">Crear Cuenta</h2>
            
            <form id="registro-form" style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="nombre" style="font-weight: 500;">Nombre Completo:</label>
                    <input type="text" id="nombre" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                </div>

                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="reg-email" style="font-weight: 500;">Correo Electrónico:</label>
                    <input type="email" id="reg-email" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="reg-password" style="font-weight: 500;">Contraseña:</label>
                    <input type="password" id="reg-password" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                </div>

                <button type="submit" class="checkout-btn" style="margin-top: 10px;">Registrarse</button>
            </form>

            <p style="text-align: center; margin-top: 20px; color: #666; font-size: 14px;">
                ¿Ya tienes una cuenta? <a href="login.html" style="color: #2ecc71; text-decoration: none; font-weight: bold;">Inicia sesión aquí</a>
            </p>
        </div>
    </main>

    <footer class="main-footer">
        <p class="copyright">&copy; 2026 MiTienda E-Commerce. Todos los derechos reservados.</p>
    </footer>

    <!--Vinculamos el comportamiento del menú -->
    <script src="js/menu-animado.js"></script>
    <script src="js/carrito.js"></script>
</body>
</html>

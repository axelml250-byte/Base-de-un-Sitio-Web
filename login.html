<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiTienda | Iniciar Sesión</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <!-- CABECERA LIMPIA -->
    <header class="main-header">
        <div class="header-container">           
            <h1 class="logo">MiTienda</h1>        
            <nav class="nav-left">
                <a href="index.html">Inicio</a>
                <a href="productos.html">Productos</a>
                <a href="nosotros.html">Conócenos</a>
                <a href="contacto.html">Contacto</a>
            </nav>
            <div class="nav-right">
                <a href="login.html" id="menu-login-btn">Iniciar Sesión</a>
                <a href="registro.html" id="menu-registro-btn">Registrarse</a>
                <a href="perfil.html" id="menu-perfil-btn" style="display: none;">👤 Mi Perfil</a>
                <a href="carrito.html" style="color: #2ecc71; font-weight: bold; border-left: 1px solid #ddd; padding-left: 15px; text-decoration: none;">
                    🛒 Carrito (<span id="cart-counter">0</span>)
                </a>
            </div>
        </div>
    </header>

    <main class="main-content" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
        <div style="background: white; padding: 40px; border-radius: 8px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); width: 100%; max-width: 400px;">
            <h2 style="text-align: center; margin-bottom: 20px; color: #2c3e50;">Iniciar Sesión</h2>
            
            <form id="login-form" style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="email" style="font-weight: 500;">Correo Electrónico:</label>
                    <input type="email" id="email" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="password" style="font-weight: 500;">Contraseña:</label>
                    <input type="password" id="password" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                </div>

                <button type="submit" class="checkout-btn" style="background-color: #3498db; margin-top: 10px;">Ingresar</button>
            </form>

            <p style="text-align: center; margin-top: 20px; color: #666; font-size: 14px;">
                ¿No tienes una cuenta? <a href="registro.html" style="color: #3498db; text-decoration: none; font-weight: bold;">Regístrate aquí</a>
            </p>
        </div>
    </main>

    <footer class="main-footer">
        <p class="copyright">&copy; 2026 MiTienda E-Commerce. Todos los derechos reservados.</p>
    </footer>

    <!--Vinculamos el comportamiento del menú -->
    <script src="js/menu-animado.js"></script>
    <script src="js/carrito.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiTienda | Iniciar Sesión</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <header class="main-header" style="background-color: white; border-bottom: 1px solid #eee; padding: 15px 0; width: 100%;">
        <div class="header-container" style="display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0 30px;">
        
            <h1 class="logo" style="margin: 0; font-size: 24px; color: #2c3e50;">MiTienda</h1>
        
            <nav class="nav-left" style="display: flex; gap: 25px;">
                <a href="index.html" style="text-decoration: none; color: #333; font-weight: 500;">Inicio</a>
                <a href="productos.html" style="text-decoration: none; color: #333; font-weight: 500;">Productos</a>
                <a href="nosotros.html" style="text-decoration: none; color: #333; font-weight: 500;">Conócenos</a>
                <a href="contacto.html" style="text-decoration: none; color: #333; font-weight: 500;">Contacto</a>
            </nav>

            <div class="nav-right" style="display: flex; align-items: center; gap: 15px;">
                <a href="login.html" id="menu-login-btn" style="font-size: 14px; color: #3498db; text-decoration: none; font-weight: 500;">Iniciar Sesión</a>
                <a href="registro.html" id="menu-registro-btn" style="font-size: 14px; background-color: #3498db; color: white; padding: 6px 12px; border-radius: 4px; text-decoration: none; font-weight: 500;">Registrarse</a>
            
                <a href="perfil.html" id="menu-perfil-btn" style="display: none; font-size: 14px; font-weight: bold; color: #2c3e50; text-decoration: none;">👤 Mi Perfil</a>

                <a href="carrito.html" style="color: #2ecc71; font-weight: bold; border-left: 1px solid #ddd; padding-left: 15px; text-decoration: none;">
                    🛒 Carrito (<span id="cart-counter">0</span>)
                </a>
            </div>

        </div>
    </header>

    <main class="main-content" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
        <div style="background: white; padding: 40px; border-radius: 8px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); width: 100%; max-width: 400px;">
            <h2 style="text-align: center; margin-bottom: 20px; color: #2c3e50;">Iniciar Sesión</h2>
            
            <form id="login-form" style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="email" style="font-weight: 500;">Correo Electrónico:</label>
                    <input type="email" id="email" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                </div>
                
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <label for="password" style="font-weight: 500;">Contraseña:</label>
                    <input type="password" id="password" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
                </div>

                <button type="submit" class="checkout-btn" style="background-color: #3498db; margin-top: 10px;">Ingresar</button>
            </form>

            <p style="text-align: center; margin-top: 20px; color: #666; font-size: 14px;">
                ¿No tienes una cuenta? <a href="registro.html" style="color: #3498db; text-decoration: none; font-weight: bold;">Regístrate aquí</a>
            </p>
        </div>
    </main>

    <footer class="main-footer">
        <p class="copyright">&copy; 2026 MiTienda E-Commerce. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
